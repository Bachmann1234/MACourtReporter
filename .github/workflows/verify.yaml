name: Node.js CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test
        env:
          TWITTER_API_KEY: fake
          TWITTER_API_KEY_SECRET: fake
          TWITTER_ACCESS_TOKEN: fake
          TWITTER_ACCESS_TOKEN_SECRET: fake